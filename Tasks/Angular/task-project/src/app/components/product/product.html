<table>
    <thead>
        <tr>
            <th>Id</th>
            <th>Title</th>
            <th>Image</th>
        </tr>
    </thead>

    <tbody>
        @for (data of productData(); track data.id) {
            <tr>
                <td>{{ data.id }}</td>
                <td>{{ data.title }}</td>
                <td>
                    <img [src]="data.images?.[0]" width="80" />
                </td>
            </tr>
        }
    </tbody>
</table>
