<div class="form-wrapper">
  <form (ngSubmit)="submit()" class="form-box">
    <h3>Update Product</h3>
    <div class="form-group">
      <label>Product ID</label>
      <input type="number" [(ngModel)]="productId" name="productId" required>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" [(ngModel)]="product.title" name="title" required>
    </div>
    <div class="form-group">
      <label>Price</label>
      <input type="number" [(ngModel)]="product.price" name="price" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" [(ngModel)]="product.description" name="description" required>
    </div>
    <div class="form-group">
      <label>Category ID</label>
      <input type="number" [(ngModel)]="product.categoryId" name="categoryId" required>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="text" [(ngModel)]="product.images[0]" name="image" required>
    </div>
    <button type="submit">Update</button>
    <p class="msg">{{ message }}</p>
  </form>
</div>
