<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .heading1 {
            height: 80px;
            width: 200px;
            margin: 100px auto;
            margin-bottom: 0;
        
        }

        .container {
            width: 400px;
            height: 500px;
            border: 1px solid;
            margin: auto;
            border-radius: 1rem;
            background-color: rgb(139, 229, 75);
        }

        .inner-container {
            width: 90%;
            height: 90%;
            /* border: 3px solid red;     */
            margin: 20px auto;
        }

        .box1 , .box2 {
            width: 100%;
            height: 50%;
            /* border: 1px solid red; */
        }

        .box1:hover {
            background-color: rgb(85, 175, 20);
            border-radius: 10px;
        }

        .box2:hover {
            background-color: rgb(85, 175, 20);
            border-radius: 10px;
        }

        .box1 img {
            height: 100%;
            /* width: 50%; */
            border-radius: 50%;
            /* margin: 0px 100px; */
        }

        .box2 .inner-box2 {
            /* text-align: center; */
            /* margin: auto; */
            /* margin: 100px 0px; */
            padding: 70px 50px 30px 90px;
        }
        
    </style>
</head>
<body>

    <h1 class="heading1">Box Property</h1>

    <div class="container">

        <div class="inner-container">

            <div class="box1">
                <img src="./assets/eye.jpg" alt="An Eye Image...">
            </div>
            <div class="box2">
                <div class="inner-box2">
                    <h2>Details of the image</h2>

                    <ul>
                        <li>Tree Image with an Eye</li>
                        <li>Tree Image with an Eye</li>
                        <li>Tree Image with an Eye</li>
                        <li>Tree Image with an Eye</li> 
                    </ul>                    

                </div>
            </div>

        </div>

    </div>
    
</body>
</html>
