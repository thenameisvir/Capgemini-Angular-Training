<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>

    <style>
        img {
            object-fit: cover;
            position: absolute;
            width: 250px;
            height: 250px;
            border: 1px solid;
            border-radius: 10px;
            transition: 0.6s ease;
        }

        .img2 {
            top: 70px;
            left: 70px;
        }

        .img3 {
            top: 140px;
            left: 140px;
        }

        img:hover {
            transform: scale(1.1);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <img src="./assets/eye.jpg" alt="Eye Image" class="img1">
    <img src="./assets/mix.jpg" alt="Mix Image" class="img2">
    <img src="./assets/road.jpg" alt="Road Image" class="img3">
    
</body>
</html>
