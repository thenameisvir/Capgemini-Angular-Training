<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        main {
            height: 80vh;
            width: 70vw;
            margin: 100px auto;
            border: 1px solid;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-rows: 1fr 3fr 1fr;
        }

        .box {
            border: 1px solid;
            text-align: center;
            /* justify-content: center;
            align-items: center; */
        }

        .box1 {
            grid-area: 1/1/2/4;
            background-color: aqua;
        }

        .box2 {
            grid-area: 2/1/3/2;
            background-color: chartreuse;
        }

        .box3 {
            grid-area: 2/2/3/3;
            background-color: tomato;
        }

        .box4 {
            grid-area: 2/3/3/4;
            background-color: darkmagenta;
        }

        .box5 {
            grid-area: 3/1/4/4;
            background-color: olive;
        }


        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 2fr 2fr 1fr;
            }

            .box1 {
                grid-area: 1/1/2/3;
            }

            .box2 {
                grid-area: 2/1/3/2;
            }

            .box3 {
                grid-area: 2/2/3/3;
            }

            .box4 {
                grid-area: 3/1/4/3;
            }

            .box5 {
                grid-area: 4/1/5/3;
            }
        }

        @media (max-width: 360px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 2fr 3fr 2fr 1fr;
            }

            .box1 {
                grid-area: 1/1/2/2;
            }

            .box2 {
                grid-area: 2/1/3/2;
            }

            .box3 {
                grid-area: 3/1/4/2;
            }

            .box4 {
                grid-area: 4/1/5/2;
            }

            .box5 {
                grid-area: 5/1/6/2;
            }
        }
    </style>
</head>
<body>

    <main>
        <section class="box box1">Header</section>
        <section class="box box2">Side Bar</section>
        <section class="box box3">Content 1</section>
        <section class="box box4">Side Bar</section>
        <section class="box box5">Footer</section>
    </main>
    
</body>
</html>
