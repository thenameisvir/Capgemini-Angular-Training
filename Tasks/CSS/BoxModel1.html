<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 300px;
            height: 300px;
            margin: 100px auto;

            border: 1px solid black;
        }

        .inner-container {
            border: 2px solid red;

            width: 200px;
            height: 200px;
            margin: 50px auto;
            padding: 55px;
            text-align: center;
            border-radius: 10px;
        }
    </style>

</head>
<body>
    
    <div class="container">

        <div class="inner-container">

            <p>This is a sample paragraph with sample text</p>

        </div>

    </div>

</body>
</html>
