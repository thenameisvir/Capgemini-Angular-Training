<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->.
     
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(212, 243, 232);
        }

        .heading {
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: 600;
        }

        .form {
            max-width: 520px;
            margin: 45px auto;
            padding: 30px;
            border-radius: 12px;
            background-color: white
        }

        .row {
            display: flex;
            gap: 20px;
            margin: 20px 0px;
        }

        .input-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"] , input[type="email"] , textarea {
            width: 100%;
            padding: 10px;
            border-radius: 7px;
            border: 1px solid;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #1b7f5b;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin: 20px 0px;
        }

        .radio-group label {
            display: flex;
            gap: 7px;
            align-items: center;
            width: 100%;
            border: 1px solid;
            padding: 10px;
            border-radius: 7px;
            cursor: pointer;
            transition: 0.3s;
        }

        .radio-group label:hover, input:hover , textarea:hover {
            border-color: #1b7f5b;
            background-color: #f0faf6;
        }

        .checkbox-group label {
            display: flex;
            gap: 7px;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        button {
            width: 100%;
            padding: 7px;
            border-radius: 7px;
            border: none;
            background-color: #1b7f5b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #14664a;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="form">
        <h2 class="heading">Contact Us</h2>

        <form>
            <div class="row">
                <div class="input-group">
                    <label for="first-name">First Name *</label>
                    <input type="text" id="first-name" required>
                </div>

                <div class="input-group">
                    <label for="last-name">Last Name *</label>
                    <input type="text" id="last-name" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Query Type *</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="query" required> General Enquiry
                        </label>
                        <label>
                            <input type="radio" name="query" required> Support Request
                        </label>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="message">Message *</label>
                    <textarea rows="5" cols="48" id="message" required></textarea>
                </div>
            </div>

            <div class="row">
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" required>
                        I consent to being contacted by the team *
                    </label>
                </div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
