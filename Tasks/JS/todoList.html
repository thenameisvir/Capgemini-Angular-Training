<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            margin: 20px auto;
            display: flex;
            /* justify-content: center; */
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }

        .inputField input , .inputField button {
            padding: 10px;
            border-radius: 7px;
            border: 1px solid;
        }

        .list {
            display: flex;
            flex-direction: column;
        }

        .list li , .list button {
            padding: 10px;
            border-radius: 7px;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <main class="container">
        <h1 class="heading">Add your task here...</h1>

        <section class="inputField">
            <input type="text" placeholder="Enter your task..." id="taskInput">
            <button id="addTaskBtn" class="addTask">Add Task</button>
        </section>

        <section id="listTask" class="list">

        </section>
    </main>


    <script src="./todoList.js"></script>
    
</body>
</html>
