<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Summary</title>
  <!-- <link rel="stylesheet" href="style.css"> -->.

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
        }

        body {
        height: 100vh;
        background: #d6e1ff;
        
        }

        .container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        }

        .card {
        width: 350px;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        }

        .card-header img {
        width: 100%;
        display: block;
        }

        .card-body {
        padding: 25px;
        }

        .card-body h2 {
        margin-bottom: 10px;
        color: #1f2f56;
        }

        .card-body p {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 20px;
        }

        .plan-box {
        background: #f5f7ff;
        border-radius: 10px;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        }

        .plan-info {
        display: flex;
        align-items: center;
        gap: 10px;
        }

        .plan-info img {
        width: 30px;
        }

        .plan-info h4 {
        font-size: 14px;
        color: #1f2f56;
        }

        .plan-info p {
        font-size: 12px;
        color: #6b7280;
        }

        .plan-box a {
        color: #4f46e5;
        font-size: 12px;
        text-decoration: none;
        font-weight: bold;
        }

        .payment-btn {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 15px;
        transition: 0.3s;
        }

        .payment-btn:hover {
        background: #4338ca;
        }

        .cancel {
        font-size: 13px;
        color: #6b7280;
        cursor: pointer;
        }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">

      <div class="card-header">
        <img src="./assets/order-summary.png" alt="music">
      </div>

      <div class="card-body">
        <h2>Order Summary</h2>
        <p>
          You can now listen to millions of songs,
          audiobooks, and podcasts on any device anywhere you like!
        </p>

        <div class="plan-box">
          <div class="plan-info">
            <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" alt="icon">
            <div>
              <h4>Annual Plan</h4>
              <p>$59.99/year</p>
            </div>
          </div>
          <a href="#">Change</a>
        </div>

        <button class="payment-btn">Proceed to Payment</button>
        <p class="cancel">Cancel Order</p>
      </div>

    </div>
  </div>

</body>
</html>
