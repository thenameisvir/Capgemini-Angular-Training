<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Unordered List</h1>

    <!-- type :- default -->
     <ul>
        <li>HTML5</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TailWind CSS</li>
        <li>React Js</li>
     </ul>

     <!-- type :- none -->
     <ul type="none">
        <li>HTML5</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TailWind CSS</li>
        <li>React Js</li>
     </ul>

     <!-- type :- circle -->
     <ul type="circle">
        <li>HTML5</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TailWind CSS</li>
        <li>React Js</li>
     </ul>

     <!-- type :- square -->
     <ul type="square">
        <li>HTML5</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TailWind CSS</li>
        <li>React Js</li>
     </ul>

     <!-- type :- disk (same as default) -->
     <ul type="disk">
        <li>HTML5</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TailWind CSS</li>
        <li>React Js</li>
     </ul>
</body>
</html>
